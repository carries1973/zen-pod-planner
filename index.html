<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEN Residential — Leasing Pod Planner</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;height:100vh;overflow:hidden;background:#111827;color:#e5e7eb}
#sidebar{width:360px;min-width:360px;display:flex;flex-direction:column;background:#1f2937;border-right:1px solid #374151}
#hdr{padding:12px 14px 8px;background:#111827;border-bottom:1px solid #374151}
#hdr h1{font-size:13px;font-weight:700;color:#f9fafb;margin-bottom:2px}
#hdr .sub{font-size:10px;color:#6b7280}
#tabs{display:flex;border-bottom:1px solid #374151}
.tab{flex:1;padding:8px 0;font-size:11px;font-weight:600;text-align:center;cursor:pointer;color:#6b7280;border-bottom:2px solid transparent;transition:all .15s}
.tab.active{color:#f9fafb;border-bottom-color:#3b82f6}
#panel-props,#panel-pods{display:flex;flex-direction:column;flex:1;overflow:hidden}
#filters{padding:8px 10px;border-bottom:1px solid #374151;display:flex;gap:4px;flex-wrap:wrap}
.fb{padding:3px 9px;border-radius:12px;border:1px solid #374151;background:transparent;color:#9ca3af;font-size:10px;cursor:pointer;transition:all .15s;white-space:nowrap}
.fb.active{background:#2563eb;border-color:#2563eb;color:white;font-weight:600}
.fb:hover:not(.active){border-color:#6b7280;color:#e5e7eb}
#srch-wrap{padding:6px 10px;border-bottom:1px solid #374151}
#srch{width:100%;padding:5px 9px;background:#111827;border:1px solid #374151;border-radius:5px;color:#e5e7eb;font-size:11px;outline:none}
#srch::placeholder{color:#4b5563}
#srch:focus{border-color:#2563eb}
#prop-list{flex:1;overflow-y:auto}
.pi{padding:7px 10px;cursor:pointer;border-bottom:1px solid #111827;display:flex;align-items:flex-start;gap:8px;user-select:none;transition:background .1s}
.pi:hover{background:#2d3748}
.pi.in-tour{background:#0d2d1a;border-left:3px solid #10b981;padding-left:7px}
.pi.in-tour .pn{color:#34d399}
.chk{width:12px;height:12px;border:2px solid #4b5563;border-radius:2px;flex-shrink:0;margin-top:3px;position:relative}
.pi.in-tour .chk{background:#10b981;border-color:#10b981}
.pi.in-tour .chk::after{content:'✓';position:absolute;top:-4px;left:-1px;font-size:10px;color:white;font-weight:800}
.pb{flex:1;min-width:0}
.pn{font-size:11px;font-weight:600;color:#d1d5db;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pa{font-size:9px;color:#6b7280;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ptags{display:flex;gap:2px;margin-top:3px;flex-wrap:wrap}
.tg{padding:1px 4px;border-radius:2px;font-size:8px;font-weight:600}
.t-pod{color:white}
.t-vac{background:#450a0a;color:#f87171}
.t-type{background:#2d1b69;color:#a78bfa}
.pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;border:1px solid rgba(255,255,255,0.3)}
/* Pod panel */
#pod-list{flex:1;overflow-y:auto;padding:8px 0}
.pod-row{padding:8px 12px;border-bottom:1px solid #111827;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .1s}
.pod-row:hover{background:#2d3748}
.pod-swatch{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.pod-body{flex:1}
.pod-name{font-size:12px;font-weight:700;color:#f9fafb;margin-bottom:2px}
.pod-stats{font-size:10px;color:#6b7280}
.pod-vac{font-size:11px;font-weight:700}
.pod-toggle{font-size:10px;color:#4b5563;cursor:pointer;padding:2px 6px;border:1px solid #374151;border-radius:4px}
.pod-toggle.on{color:#10b981;border-color:#10b981}
/* Tour panel */
#tour-panel{background:#111827;border-top:2px solid #dc2626;flex-shrink:0}
#tour-hdr{padding:7px 10px;background:#dc2626;display:flex;justify-content:space-between;align-items:center}
#tour-hdr h3{font-size:11px;font-weight:700;color:white}
#tour-badge{background:rgba(0,0,0,.25);padding:1px 7px;border-radius:10px;font-size:10px;color:white}
#tour-stops-wrap{max-height:180px;overflow-y:auto}
#tour-empty{padding:14px;text-align:center;color:#4b5563;font-size:11px}
.sr{padding:6px 10px;border-bottom:1px solid #1f2937;display:flex;align-items:flex-start;gap:7px}
.sn{width:18px;height:18px;border-radius:50%;background:#dc2626;color:white;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.sb{flex:1;min-width:0}
.sname{font-size:10px;font-weight:600;color:#e5e7eb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sleg{font-size:9px;color:#f59e0b;margin-top:1px}
.sleg.long{color:#f87171}
.srm{color:#4b5563;cursor:pointer;font-size:14px;padding:0 2px;line-height:1.4;flex-shrink:0}
.srm:hover{color:#dc2626}
#tour-footer{padding:8px 10px;background:#0d1117;display:flex;justify-content:space-around;border-top:1px solid #1f2937}
.stat{text-align:center}
.sv{font-size:16px;font-weight:700}
.sl{font-size:8px;color:#4b5563;text-transform:uppercase;letter-spacing:.05em;margin-top:1px}
.cg{color:#10b981}.cy{color:#f59e0b}.cr{color:#ef4444}.cb{color:#60a5fa}
#feasibility{padding:5px 10px;font-size:10px;font-weight:600;text-align:center;border-top:1px solid #1f2937}
.fg{background:#052e16;color:#34d399}.fy{background:#422006;color:#fbbf24}.fr{background:#450a0a;color:#f87171}
#map{flex:1}
#prog{position:fixed;top:0;left:360px;right:0;height:3px;background:#2563eb;width:0;z-index:9999;pointer-events:none;display:none}
.leaflet-popup-content-wrapper{background:#1f2937;color:#e5e7eb;border:1px solid #374151;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.leaflet-popup-tip{background:#1f2937}
.leaflet-popup-content{margin:10px 13px;font-size:11px;line-height:1.6}
.ppname{font-weight:700;font-size:12px;color:#f9fafb;margin-bottom:3px}
.ppaddr{color:#9ca3af;margin-bottom:5px;font-size:10px}
.pptags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px}
.ppbtn{width:100%;padding:5px;background:#2563eb;color:white;border:none;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer}
.ppbtn:hover{background:#1d4ed8}
.ppbtn.added{background:#10b981}
.ppbtn.added:hover{background:#059669}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#374151;border-radius:2px}
</style>
</head>

  </div>
</div>

// ── Pod circles ───────────────────────────────────────────────────────────────
function drawPods(){
  PODS.forEach(pod=>{
    if(pod.id>=8){return;} // hide out-of-city tiny pods from initial view
    const col=pod.color;
    const circle=L.circle([pod.centroid[0],pod.centroid[1]],{
      radius:pod.radius*1000,
      color:col,weight:2,dashArray:'8,5',
      fillColor:col,fillOpacity:0.07,
      interactive:false
    });
    const label=L.marker([pod.centroid[0],pod.centroid[1]],{
      icon:L.divIcon({
        html:`<div style="background:${col}cc;color:white;padding:3px 8px;border-radius:12px;font-size:10px;font-weight:700;white-space:nowrap;border:1px solid ${col};box-shadow:0 2px 6px rgba(0,0,0,.5)">${pod.name}</div>`,
        className:'',iconAnchor:[40,12]
      }),interactive:false
    });
    const members=PROPS.filter(p=>p.pod===pod.id);
    const totalVac=members.reduce((s,p)=>s+p.vacant,0);
    podLayers[pod.id]={circle,label,members:members.length,vacant:totalVac};
    podVisible[pod.id]=true;
    circle.addTo(map);
    label.addTo(map);
  });
}

function togglePod(id){
  podVisible[id]=!podVisible[id];
  const layer=podLayers[id];
  if(!layer) return;
  if(podVisible[id]){layer.circle.addTo(map);layer.label.addTo(map);}
  else{map.removeLayer(layer.circle);map.removeLayer(layer.label);}
  renderPodList();
}

  const badge = vac>0?`<div style="position:absolute;top:-5px;right:-5px;background:#dc2626;color:white;border-radius:8px;font-size:8px;font-weight:800;padding:0 3px;min-width:13px;text-align:center;border:1px solid #111;line-height:14px">${vac>99?'99+':vac}</div>`:'';
  return L.divIcon({
    html:`<div style="position:relative"><div style="width:${size}px;height:${size}px;border-radius:50%;background:${col};border:${vac>0?'2px solid white':'1.5px solid rgba(255,255,255,.5)'};box-shadow:0 1px 5px rgba(0,0,0,.5)"></div>${badge}</div>`,
    className:'',iconSize:[size,size],iconAnchor:[size/2,size/2]
  });
}

function buildPopup(p){
  const col=podColor(p.pod), pname=podName(p.pod);
  const inTour=tour.includes(p.id);
  const vacText=p.vacant>0?`<span class="tg t-vac">${p.vacant} vacant now</span>`:'';
  return `<div class="ppname">${p.name}</div>
    <div class="ppaddr">${p.addr.replace(', Canada','')}</div>
    <div class="pptags">
      <span class="tg t-pod" style="background:${col}cc">${pname}</span>
      <span class="tg t-type">${p.type}</span>
      ${vacText}
    </div>
    <button class="ppbtn ${inTour?'added':''}" id="ppb-${p.id}">${inTour?'✓ Remove from Tour':'+ Add to Tour Day'}</button>`;
}

function initMarker(p){
  const inTour=tour.includes(p.id), idx=tour.indexOf(p.id);
  const m=L.marker([p.lat,p.lng],{icon:makeIcon(p,inTour,idx)});
  m.bindPopup(()=>buildPopup(p),{maxWidth:240,minWidth:190});
  m.on('popupopen',()=>{
    setTimeout(()=>{
      const btn=document.getElementById(`ppb-${p.id}`);
      if(btn) btn.onclick=()=>{toggleTour(p.id);m.closePopup();};
    },30);
  });
  markers[p.id]=m;
  clusterGroup.addLayer(m);
}

function refreshIcon(p){
  const m=markers[p.id]; if(!m) return;
  m.setIcon(makeIcon(p,tour.includes(p.id),tour.indexOf(p.id)));
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(t){
  document.getElementById('tab-props').classList.toggle('active',t==='props');
  document.getElementById('tab-pods').classList.toggle('active',t==='pods');
  document.getElementById('panel-props').style.display=t==='props'?'flex':'none';
  document.getElementById('panel-pods').style.display=t==='pods'?'flex':'none';
}

// ── Render Pods Panel ─────────────────────────────────────────────────────────
function renderPodList(){
  const el=document.getElementById('pod-list');
  const mainPods=PODS.filter(p=>p.id<8);
  el.innerHTML=mainPods.map(pod=>{
    const vis=podVisible[pod.id]!==false;
    const layer=podLayers[pod.id]||{members:0,vacant:0};
    const vacCol=layer.vacant>50?'cr':layer.vacant>10?'cy':'cg';
    return `<div class="pod-row" onclick="flyToPod(${pod.id})">
      <div class="pod-swatch" style="background:${pod.color}"></div>
      <div class="pod-body">
        <div class="pod-name">${pod.name}</div>
        <div class="pod-stats">${layer.members} properties · <span class="pod-vac ${vacCol}">${layer.vacant} vacant now</span></div>
      </div>
      <div class="pod-toggle ${vis?'on':''}" onclick="event.stopPropagation();togglePod(${pod.id})">${vis?'Visible':'Hidden'}</div>
    </div>`;
  }).join('');
  // Add out-of-city summary
  const outPods=PODS.filter(p=>p.id>=8&&p.id<16);
  const outRows=outPods.map(pod=>{
    const mems=PROPS.filter(p=>p.pod===pod.id);
    const vac=mems.reduce((s,p)=>s+p.vacant,0);
    return `<div class="pod-row" onclick="flyToPodCoords(${JSON.stringify(pod.centroid)})">
      <div class="pod-swatch" style="background:#6b7280"></div>
      <div class="pod-body">
        <div class="pod-name">${pod.name}</div>
        <div class="pod-stats">${mems.length} properties · ${vac} vacant</div>
      </div>
      <div class="pod-toggle" style="color:#6b7280">Out-of-city</div>
    </div>`;
  }).join('');
  el.innerHTML+=`<div style="padding:6px 12px 3px;font-size:9px;color:#4b5563;text-transform:uppercase;letter-spacing:.05em;font-weight:600;border-top:1px solid #374151;margin-top:4px">Out-of-City</div>${outRows}`;
}

function flyToPod(id){
  const pod=PODS[id]; if(!pod) return;
  map.flyTo([pod.centroid[0],pod.centroid[1]], 12, {duration:1.2});
}
function flyToPodCoords(c){
  map.flyTo([c[0],c[1]], 12, {duration:1.2});
}

// ── Render Property List ──────────────────────────────────────────────────────
function renderList(){
  const srch=document.getElementById('srch').value.toLowerCase();
  const list=document.getElementById('prop-list');
  const filtered=PROPS.filter(p=>{
    const cityOk=currentCity==='all'||(currentCity==='other'?(p.city!=='Edmonton'&&p.city!=='Calgary'):p.city===currentCity);
    const vacOk=!vacantOnly||p.vacant>0;
    const srchOk=!srch||p.name.toLowerCase().includes(srch)||p.addr.toLowerCase().includes(srch);
    return cityOk&&vacOk&&srchOk;
  });
  const inT=id=>tour.includes(id);
  list.innerHTML=filtered.map(p=>`
    <div class="pi ${inT(p.id)?'in-tour':''}" onclick="toggleTour(${p.id})">
      <div class="pdot" style="background:${podColor(p.pod)}"></div>
      <div class="pb">
        <div class="pn">${p.name}</div>
        <div class="pa">${p.addr.replace(', Alberta','').replace(', Saskatchewan','').replace(', Canada','')}</div>
        <div class="ptags">
          <span class="tg t-pod" style="background:${podColor(p.pod)}cc;color:white">${podName(p.pod)}</span>
          <span class="tg t-type">${p.type}</span>
          ${p.vacant>0?`<span class="tg t-vac">${p.vacant} vacant</span>`:''}
        </div>
      </div>
      <div class="chk"></div>
    </div>`).join('');
}

// ── Tour Logic ────────────────────────────────────────────────────────────────
function toggleTour(id){
  tour=tour.includes(id)?tour.filter(x=>x!==id):[...tour,id];
  PROPS.forEach(p=>refreshIcon(p));
  renderList();renderTourPanel();scheduleRoute();
}
function removeTourStop(id){
  tour=tour.filter(x=>x!==id);
  PROPS.forEach(p=>refreshIcon(p));
  renderList();renderTourPanel();scheduleRoute();
}
function scheduleRoute(){
  clearTimeout(routeDebounce);
  routeDebounce=setTimeout(fetchRoute,700);
}
async function fetchRoute(){
  if(routeLayer){map.removeLayer(routeLayer);routeLayer=null;}
  const stops=tour.map(id=>PROPS.find(p=>p.id===id)).filter(p=>p&&p.lat&&p.lng);
  if(stops.length<2){renderTourLegs([]);return;}
  const coords=stops.map(p=>`${p.lng},${p.lat}`).join(';');
  try{
    const r=await fetch(`https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`);
    const d=await r.json();
    if(d.code==='Ok'&&d.routes[0]){
      routeLayer=L.geoJSON(d.routes[0].geometry,{style:{color:'#dc2626',weight:3,opacity:.7,dashArray:'6,4'}}).addTo(map);
      await fetchLegTimes(stops);
    }
  }catch(e){
    renderTourLegs(stops.map((s,i)=>{
      if(!i) return null;
      const km=haversine(stops[i-1],s);
      return{km:Math.round(km*10)/10,mins:Math.round(km/0.55)};
    }).filter(Boolean));
  }
}
async function fetchLegTimes(stops){
  const coords=stops.map(p=>`${p.lng},${p.lat}`).join(';');
  try{
    const r=await fetch(`https://router.project-osrm.org/table/v1/driving/${coords}?annotations=duration,distance`);
    const d=await r.json();
    if(d.code==='Ok'){
      const legs=[];
      for(let i=0;i<stops.length-1;i++){
        legs.push({km:Math.round(d.distances[i][i+1]/100)/10,mins:Math.round(d.durations[i][i+1]/60)});
      }
      renderTourLegs(legs);
    }
  }catch(e){}
}
function haversine(a,b){
  const R=6371,dLat=(b.lat-a.lat)*Math.PI/180,dLng=(b.lng-a.lng)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function renderTourLegs(legs){lastLegs=legs||[];renderTourStops(lastLegs);}
function renderTourPanel(){
  document.getElementById('tour-badge').textContent=`${tour.length} stop${tour.length!==1?'s':''}`;
  if(!tour.length){
    document.getElementById('tour-empty').style.display='block';
    document.getElementById('tour-stops').innerHTML='';
    document.getElementById('tour-footer').style.display='none';
    document.getElementById('feasibility').textContent='';
    document.getElementById('feasibility').className='';
    return;
  }
  document.getElementById('tour-empty').style.display='none';
  renderTourStops(lastLegs);
}
function renderTourStops(legs){
  if(!tour.length) return;
  document.getElementById('tour-stops').innerHTML=tour.map((id,i)=>{
    const p=PROPS.find(x=>x.id===id); if(!p) return '';
    const leg=legs[i-1];
    const legHtml=i>0?`<div class="sleg ${leg&&leg.mins>30?'long':''}">${leg?`${leg.mins} min · ${leg.km} km`:'Calculating…'}</div>`:'';
    return `<div class="sr"><div class="sn">${i+1}</div><div class="sb"><div class="sname">${p.name}</div>${legHtml}</div><div class="srm" onclick="removeTourStop(${id})">×</div></div>`;
  }).join('');
  const totalDrive=legs.reduce((s,l)=>s+(l.mins||0),0);
  const maxLeg=legs.length?Math.max(...legs.map(l=>l.mins||0)):0;
  const totalMin=totalDrive+tour.length*45;
  const h=Math.floor(totalMin/60),m=totalMin%60;
  const dc=totalDrive>150?'cr':totalDrive>90?'cy':'cg';
  const mc=maxLeg>40?'cr':maxLeg>25?'cy':'cg';
  document.getElementById('tour-footer').style.display='flex';
  document.getElementById('tour-footer').innerHTML=`
    <div class="stat"><div class="sv ${dc}">${totalDrive>0?totalDrive+'m':'—'}</div><div class="sl">Drive</div></div>
    <div class="stat"><div class="sv ${mc}">${maxLeg>0?maxLeg+'m':'—'}</div><div class="sl">Longest</div></div>
    <div class="stat"><div class="sv cb">${totalDrive>0?h+'h '+m+'m':'—'}</div><div class="sl">Full Day</div></div>
    <div class="stat"><div class="sv cb">${tour.length}</div><div class="sl">Stops</div></div>`;
  const fEl=document.getElementById('feasibility');
  if(tour.length<2||totalDrive===0){fEl.textContent='';fEl.className='';}
  else if(totalDrive>150||maxLeg>40){fEl.textContent='⚠ Over capacity — too much drive time';fEl.className='fr';}
  else if(totalDrive>90||maxLeg>25){fEl.textContent='⚡ Tight but doable — allow buffer time';fEl.className='fy';}
  else{fEl.textContent='✓ Feasible day — efficient coverage';fEl.className='fg';}
  const pts=tour.map(id=>PROPS.find(p=>p.id===id)).filter(p=>p&&p.lat&&p.lng);
  if(pts.length>=2) map.fitBounds(L.latLngBounds(pts.map(p=>[p.lat,p.lng])),{padding:[40,40]});
}

// ── Filters ───────────────────────────────────────────────────────────────────
document.querySelectorAll('.fb').forEach(btn=>{
  btn.addEventListener('click',()=>{
    if(btn.dataset.vac){
      vacantOnly=!vacantOnly;
      btn.classList.toggle('active',vacantOnly);
    } else {
      document.querySelectorAll('.fb:not([data-vac])').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentCity=btn.dataset.city;
      if(currentCity==='Edmonton') map.flyTo([53.5461,-113.4938],11,{duration:.8});
      else if(currentCity==='Calgary') map.flyTo([51.0447,-114.0719],11,{duration:.8});
      else if(currentCity==='all') map.flyTo([53.5461,-113.4938],9,{duration:.8});
    }
    renderList();
  });
});
document.getElementById('srch').addEventListener('input',renderList);

// ── Map Legend ────────────────────────────────────────────────────────────────
const legend=L.control({position:'bottomleft'});
legend.onAdd=()=>{
  const div=L.DomUtil.create('div');
  div.style.cssText='background:#1f2937;border:1px solid #374151;padding:8px 10px;border-radius:7px;font-size:10px;color:#e5e7eb;line-height:1.9;box-shadow:0 2px 8px rgba(0,0,0,.4)';
  div.innerHTML='<div style="font-weight:700;margin-bottom:4px;color:#9ca3af;letter-spacing:.04em">LEASING PODS</div>'+
    PODS.filter(p=>p.id<8).map(p=>{
      const mems=PROPS.filter(x=>x.pod===p.id);
      const vac=mems.reduce((s,x)=>s+x.vacant,0);
      return `<div style="cursor:pointer" onclick="flyToPod(${p.id})"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${p.color};margin-right:5px;vertical-align:middle"></span>${p.name} <span style="color:#6b7280">(${mems.length})</span>${vac>0?` <span style="color:#f87171;font-size:9px">${vac}v</span>`:''}</div>`;
    }).join('');
  return div;
};
legend.addTo(map);

// ── Boot ──────────────────────────────────────────────────────────────────────
drawPods();
PROPS.forEach(p=>initMarker(p));
renderList();
renderPodList();
</script>
